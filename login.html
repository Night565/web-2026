<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="./css/login.css">
        <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400..900&display=swap" rel="stylesheet">
        <title>Login</title>
    </head>
    <body>
        <section class="login">
            <div class="login__decoration">
                <h1 class="login__title">Войти</h>
                <img class="login__image" src="./img/login/happy_human.png" alt="Happy man">
            </div>
            <form class="login__form">
                <div class="login__field">
                    <label class="login__label">Электронная почта</label>
                    <input class="login__input" type="email">
                    <p class="login__hint">Введите электропочту в формате *****@***.**</p>
                    <label class="login__label">Пароль</label>
                    <input class="login__input" type="password">
                </div>
                <button class="login__button">Продолжить</button>
            </form>
        </section>
    </body>
</html>
