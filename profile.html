<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/profile.css">
    <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400..900&display=swap">
    <title>Profile</title>
</head>
<body>
    <nav class="sidebar">
        <ul class="sidebar__list">
            <li class="sidebar__item"><a href="#"><img src="./img/home/home_icon.png" alt="Home"></a></li>
            <li class="sidebar__item"><a href="#"><img src="./img/home/profile_icon.png" alt="Profile"></a></li>
            <li class="sidebar__item"><a href="#"><img src="./img/home/plus_icon.png" alt="Plus"></a></li>
        </ul>   
    </nav>

    <main>
        <section class="profile">
            <div class="profile__header"></div>

            <img class="profile__avatar" src="./img/profile/vanya_denisov.png">
            <h1 class="profile__name">Ваня Денисов</h1>
            <h2 class="profile__bio">Привет! Я системный аналитик в ACME :) Тут моя жизнь только для самых классных!</h2>

            <div class="profile__stats">
                <img class="profile__stats-icon" src="./img/profile/img.png">
                <p class="profile__stats-text">43 поста</p>
            </div>

            <div class="profile__grid">
                <img class="profile__grid-item" src="./img/profile/street_and_winter.png">
                <img class="profile__grid-item" src="./img/profile/tower.png">
                <img class="profile__grid-item" src="./img/profile/cake.png">
                <img class="profile__grid-item" src="./img/profile/people.png">
                <img class="profile__grid-item" src="./img/profile/coffee.png">
                <img class="profile__grid-item" src="./img/profile/book.png">
                <img class="profile__grid-item" src="./img/profile/street.png">
                <img class="profile__grid-item" src="./img/profile/cup.png">
                <img class="profile__grid-item" src="./img/profile/more_two_people.png">
            </div>
        </section>
    </main>
</body>
</html>
